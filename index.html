<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FTN Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #0a0a0a;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: #f0f0f0;
            overflow-x: hidden;
            cursor: none;
            background: radial-gradient(circle at 30% 40%, #1a0b1f, #0a0a0a);
            will-change: background;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a2a; }
        ::-webkit-scrollbar-thumb { background: #b77dff; border-radius: 4px; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cursor-glow {
            position: fixed;
            width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(180, 100, 255, 0.4) 0%, rgba(180, 100, 255, 0) 80%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            will-change: left, top;
        }
        .loading-bar {
            position: fixed;
            top: 0; left: 0;
            width: 0%; height: 2px;
            background: linear-gradient(90deg, #c084fc, #f0a6ff);
            z-index: 10000;
            transition: width 0.2s ease;
        }
        section {
            position: relative;
            width: 100%; min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent;
            z-index: 1;
        }
        .hero { flex-direction: column; position: relative; }
        .hero-center { position: relative; display: flex; justify-content: center; width: 100%; }
        .brand-wrapper { position: relative; display: inline-block; }
        .logo-img { width: 200px; height: auto; display: block; opacity: 0; transform: scale(0.95); }
        .logo-text {
            position: absolute;
            left: 100%; margin-left: 20px;
            top: 50%;
            transform: translateY(-50%) translateX(10px);
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff, #d9b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transition: none;
        }
        .slogan {
            margin-top: 40px;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: #ddd;
            text-transform: uppercase;
            background: rgba(200,100,255,0.08);
            padding: 10px 24px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            opacity: 0;
            transform: translateY(30px);
        }
        .scroll-hint {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 0%; height: 1px;
            background: linear-gradient(90deg, transparent, #c084fc, #f0a6ff, transparent);
        }
        #fx-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 6;
        }
        .story-section {
            padding: 10vh 8%;
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }
        .story-text {
            flex: 1.2;
            max-width: 1000px;
            margin: 0 auto;
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 300;
            color: #e0d4ff;
        }
        .story-text p { margin-bottom: 1.5rem; }
        .carousel-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
        }
        .carousel-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .carousel-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            overflow-x: visible;
            padding: 1rem 0;
            will-change: transform;
            transform: translateZ(0);
        }
        .category-carousel-card {
            flex-shrink: 0;
            width: 240px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: default;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(20, 12, 35, 0.6);
            border: 1px solid rgba(200, 100, 255, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            position: relative;
            transform: translateZ(0);
        }
        .category-carousel-card.center {
            width: 320px;
            transform: scale(1.1);
            border-color: #f0a6ff;
            box-shadow: 0 20px 40px rgba(200,100,255,0.4);
            z-index: 3;
            cursor: pointer;
        }
        .category-carousel-card.center:hover {
            transform: scale(1.15);
            box-shadow: 0 30px 50px rgba(200,100,255,0.6);
            transition: all 0.3s ease;
        }
        .category-carousel-card.left,
        .category-carousel-card.right {
            opacity: 0.65;
            transform: scale(0.85);
            cursor: default;
        }
        .category-carousel-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
        }
        .category-carousel-card .card-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: 2px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: #f0e6ff;
            text-shadow: 0 0 8px rgba(200,100,255,0.5);
        }
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px; height: 48px;
            background: rgba(20, 12, 35, 0.85);
            border: 1px solid rgba(200,100,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            color: #f0a6ff;
            font-size: 2rem;
            font-weight: 300;
            line-height: 1;
            transform: translateY(calc(-50% - 6px));
        }
        .carousel-arrow:hover {
            background: rgba(200,100,255,0.6);
            transform: translateY(calc(-50% - 6px)) scale(1.05);
        }
        .carousel-arrow.left { left: 0; }
        .carousel-arrow.right { right: 0; }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 2, 15, 0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.4s, visibility 0s 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow-y: auto;
        }
        .overlay.active { visibility: visible; opacity: 1; transition: opacity 0.4s; }
        .close-overlay {
            position: fixed;
            top: 30px; right: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #c084fc;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 400;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            z-index: 1010;
        }
        .close-overlay:hover { background: #c084fc; color: #0a0a0a; }
        /* 作品网格使用 Flex 布局，稳定可靠 */
        .works-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            width: 85%;
            max-width: 1200px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .work-card {
            flex: 0 0 calc(25% - 1.5rem);
            min-width: 200px;
            background: #1e172a;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .work-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            background: #2a1a3a;
        }
        .work-card .work-title {
            padding: 12px;
            font-size: 0.9rem;
            text-align: center;
            background: rgba(0,0,0,0.5);
            color: #f0e6ff;
        }
        .work-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(200,100,255,0.4);
            border: 1px solid rgba(200,100,255,0.6);
        }
        /* 详情页关闭按钮优化（始终可见） */
        .close-detail {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2001;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .close-detail:hover {
            background: rgba(200,100,255,0.8);
            transform: scale(1.05);
        }
        .detail-container {
            display: flex;
            width: 90%;
            max-width: 1400px;
            min-height: 60vh;
            max-height: 90vh;
            background: rgba(20, 12, 35, 0.9);
            border-radius: 32px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(200,100,255,0.3);
            position: relative;
        }
        .detail-image {
            flex: 1.2;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .carousel-img {
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: opacity 0.2s;
        }
        .detail-info {
            flex: 0.8;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            overflow-y: auto;
        }
        /* 手机端适配 */
        @media (max-width: 800px) {
            .logo-img { width: 120px; }
            .logo-text { font-size: 1.6rem; letter-spacing: 3px; margin-left: 12px; }
            .story-section { padding: 10vh 5%; }
            .story-text { max-width: 100%; font-size: 0.95rem; }
            .category-carousel-card { width: 180px; }
            .category-carousel-card.center { width: 240px; }
            .carousel-arrow { width: 36px; height: 36px; font-size: 1.5rem; }
            .works-grid { gap: 1rem; padding: 1rem; width: 95%; }
            .work-card { flex: 0 0 calc(50% - 0.5rem); min-width: 0; }
            .detail-container {
                flex-direction: column;
                width: 95%;
                max-height: 90vh;
            }
            .detail-image { flex: none; }
            .carousel-img { max-height: 40vh; }
            .detail-info { padding: 20px; max-height: 50vh; }
            .close-detail {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
                background: rgba(0,0,0,0.7);
            }
        }
        @media (max-width: 480px) {
            .work-card { flex: 0 0 100%; }
            .category-carousel-card { width: 140px; }
            .category-carousel-card.center { width: 200px; }
            .carousel-arrow { width: 30px; height: 30px; font-size: 1.2rem; }
            .slogan { font-size: 0.8rem; letter-spacing: 4px; }
        }
        .detail-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #08040e;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-overlay.active { visibility: visible; opacity: 1; }
        .carousel-arrow-detail {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.5rem;
            transition: all 0.2s;
            z-index: 10;
        }
        .carousel-arrow-detail:hover { background: rgba(200,100,255,0.6); transform: translateY(-50%) scale(1.1); }
        .carousel-arrow-detail.left { left: 20px; }
        .carousel-arrow-detail.right { right: 20px; }
        .carousel-indicators {
            position: absolute;
            bottom: 15px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }
        .carousel-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.2s;
            cursor: pointer;
        }
        .carousel-dot.active { background: #f0a6ff; transform: scale(1.3); }
        .work-detail-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: linear-gradient(90deg, #c084fc, #f0a6ff);
            border-radius: 40px;
            text-decoration: none;
            color: #0a0a0a;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            align-self: flex-start;
        }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div class="loading-bar" id="loadingBar"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<canvas id="fx-canvas"></canvas>

<main>
    <section class="hero" id="hero">
        <div class="hero-center">
            <div class="brand-wrapper" id="brandWrapper">
                <img src="images/FTN-logo.webp" alt="FTN Logo" class="logo-img" id="mainLogo">
                <span class="logo-text" id="mainName">FTN STUDIO</span>
            </div>
        </div>
        <div class="slogan" id="sloganText">致力于向世界展示不务正业的热爱</div>
        <div class="scroll-hint" id="scrollHint"></div>
    </section>

    <section class="story-section" id="storySection">
        <div class="story-text" id="storyTextArea"></div>
    </section>

    <section class="carousel-section" id="carouselSection">
        <div class="carousel-container">
            <div class="carousel-arrow left" id="carouselLeft">‹</div>
            <div class="carousel-track" id="carouselTrack"></div>
            <div class="carousel-arrow right" id="carouselRight">›</div>
        </div>
    </section>
</main>

<div class="overlay" id="worksOverlay">
    <div class="close-overlay" id="closeOverlay">⟵ 返回</div>
    <div class="works-grid" id="worksGrid"></div>
</div>
<div class="detail-overlay" id="detailOverlay">
    <button class="close-detail" id="closeDetail">✕</button>
    <div class="detail-container" id="detailContainer"></div>
</div>

<script>
    // ---------- 数据加载与核心逻辑（完整版）----------
    let appData = null;
    let currentCategoryWorks = [];
    let carouselIndex = 0;
    let categories = [];
    let carouselCardNodes = [null, null, null];
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            if (m === "'") return '&#39;';
            return m;
        });
    }
    
    function setImageWithFallback(imgElement, originalUrl) {
        if (!imgElement || !originalUrl) {
            if (imgElement) {
                imgElement.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                imgElement.style.backgroundColor = '#2a1a3a';
                imgElement.onerror = null;
            }
            return;
        }
        const lowerUrl = originalUrl.toLowerCase();
        if (lowerUrl.endsWith('.webp')) {
            const fallbackJpg = originalUrl.slice(0, -5) + '.jpg';
            const fallbackPng = originalUrl.slice(0, -5) + '.png';
            imgElement.src = originalUrl;
            imgElement.onerror = function() {
                if (this.src === originalUrl) {
                    this.src = fallbackJpg;
                } else if (this.src === fallbackJpg) {
                    this.src = fallbackPng;
                } else {
                    this.onerror = null;
                    this.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                    this.style.backgroundColor = '#2a1a3a';
                }
            };
        } else {
            imgElement.src = originalUrl;
            imgElement.onerror = function() {
                this.onerror = null;
                this.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                this.style.backgroundColor = '#2a1a3a';
            };
        }
    }
    
    function formatDescription(desc) {
        if (!desc) return '';
        let protected = desc.replace(/<br\s*\/?>/gi, '{{BR}}');
        let withBreaks = protected.replace(/\n/g, '<br>');
        return withBreaks.replace(/\{\{BR\}\}/g, '<br>');
    }
    
    async function loadData() {
        updateLoadingBar(10);
        try {
            const res = await fetch('data.json?_=' + Date.now());
            appData = await res.json();
            updateLoadingBar(40);
            await preloadCriticalImages(appData);
            updateLoadingBar(100);
            setTimeout(() => {
                document.getElementById('loadingBar').style.width = '100%';
                setTimeout(() => document.getElementById('loadingBar').style.opacity = '0', 500);
            }, 200);
            initFullSite();
        } catch(e) {
            console.warn('加载 data.json 失败，使用占位数据');
            appData = getPlaceholderData();
            initFullSite();
        }
    }
    
    function updateLoadingBar(percent) {
        const bar = document.getElementById('loadingBar');
        bar.style.width = Math.min(percent, 100) + '%';
    }
    
    async function preloadCriticalImages(data) {
        const urls = [];
        if(data.storyImage) urls.push(data.storyImage);
        data.categories.forEach(cat => {
            if(cat.cover) urls.push(cat.cover);
            if(cat.works[0] && cat.works[0].src) urls.push(cat.works[0].src);
            else if(cat.works[0] && cat.works[0].images && cat.works[0].images[0]) urls.push(cat.works[0].images[0]);
        });
        let loaded = 0;
        for(let url of urls) {
            await new Promise(resolve => {
                const img = new Image();
                img.onload = img.onerror = () => {
                    loaded++;
                    updateLoadingBar(40 + (loaded/urls.length)*60);
                    resolve();
                };
                img.src = url;
            });
        }
    }
    
    function getPlaceholderData() {
        return {
            studioName: "FTN STUDIO",
            slogan: "致力于向世界展示不务正业的热爱",
            story: "<p>花汐夜（Flower·Tidal·Night）这个名字诞生于2020年，没有宏大的注脚，只是三个喜欢的意象：花朵、潮汐、夜晚。很久之后才明白，这种不计较含义、只凭直觉的冲动，叫做少年心气，而它永远留在了那个开始的地方。</p><p>2026年，创始人F-tidal night重新审视过往各领域作品，推倒重做了曾经稚嫩的LOGO，并将散落的设计语言规整为统一的体系。于是，FTN Studio诞生了。它不止是一个名字的缩写，更是一种宣言：向世界展示不务正业的热爱。</p><p>人生从来没有所谓的终极意义。读书、上班、结婚、生子不是人生的标准答案，也不该成为衡量人生价值的唯一尺度。相比追逐某种既定轨迹，我们更愿意相信，每个人都应该拥有拥抱热爱、探索自我的勇气。</p><p>FTN Studio 是一个持续生长的个人创作品牌。这里汇集音乐、绘画、摄影、服装、视觉设计等不同领域的创作实践，也记录那些尚未完成的想法、灵感与实验。对于 FTN Studio 而言，每一种媒介都是情绪的容器，每一次创作都是情绪的裂变，也是对自我边界的一次探索。如果你也曾在某个时刻，为一段旋律驻足，为一张画沉默，为一道光影心动，或因为一件衣服而记住某段记忆，那么我们或许早已见过面。</p><p>那份诞生于2020年的少年心气，或许早已改变了模样，但它依然驱使着我们不断创作、表达。</p><p>欢迎来到 FTN Studio，这里没有标准答案，只有持续生长的热爱。</p>",
            storyImage: "images/story.webp",
            categories: [
                { id: "music", title: "音乐", cover: "images/covers/music.webp", works: [] },
                { id: "illust", title: "绘画", cover: "images/covers/illust.webp", works: [] },
                { id: "photo", title: "摄影", cover: "images/covers/photo.webp", works: [] },
                { id: "fashion", title: "服装设计", cover: "images/covers/fashion.webp", works: [] },
                { id: "other", title: "其他", cover: "images/covers/other.webp", works: [] }
            ]
        };
    }
    
    function initParticles() {
        particlesJS("particles-js", {
            particles: {
                number: { value: 50, density: { enable: true, value_area: 800 } },
                color: { value: "#fa67b2" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: "#9d4edd", opacity: 0.3, width: 1 },
                move: { enable: true, speed: 2, direction: "none", random: true }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" }
                }
            }
        });
    }
    
    function initCarouselNodes() {
        const track = document.getElementById('carouselTrack');
        if (!track) return;
        if (carouselCardNodes[0] === null) {
            for (let i = 0; i < 3; i++) {
                const card = document.createElement('div');
                card.className = 'category-carousel-card';
                card.innerHTML = `<img src="" alt="" loading="lazy"><div class="card-title"></div>`;
                track.appendChild(card);
                carouselCardNodes[i] = card;
            }
        }
    }
    
    function updateCarouselCards() {
        const total = categories.length;
        const prevIndex = (carouselIndex - 1 + total) % total;
        const nextIndex = (carouselIndex + 1) % total;
        const catsToShow = [
            { cat: categories[prevIndex], position: 'left' },
            { cat: categories[carouselIndex], position: 'center' },
            { cat: categories[nextIndex], position: 'right' }
        ];
        catsToShow.forEach((item, idx) => {
            const card = carouselCardNodes[idx];
            if (!card) return;
            card.className = `category-carousel-card ${item.position}`;
            const img = card.querySelector('img');
            setImageWithFallback(img, item.cat.cover);
            const titleDiv = card.querySelector('.card-title');
            titleDiv.textContent = item.cat.title;
            if (item.position === 'center') card.onclick = () => openCategoryWorks(item.cat.id);
            else card.onclick = null;
        });
    }
    
    function renderCarouselWithTransition() {
        const track = document.getElementById('carouselTrack');
        if (!track) return;
        gsap.to(track, { opacity: 0, duration: 0.2, onComplete: () => {
            updateCarouselCards();
            gsap.to(track, { opacity: 1, duration: 0.3 });
        }});
    }
    
    function nextCategory() { carouselIndex = (carouselIndex + 1) % categories.length; renderCarouselWithTransition(); }
    function prevCategory() { carouselIndex = (carouselIndex - 1 + categories.length) % categories.length; renderCarouselWithTransition(); }
    function renderCarousel() { initCarouselNodes(); updateCarouselCards(); const t = document.getElementById('carouselTrack'); if (t) t.style.opacity = 1; }
    
    function openCategoryWorks(catId) {
        const category = categories.find(c => c.id === catId);
        if (!category) return;
        currentCategoryWorks = category.works;
        const overlay = document.getElementById('worksOverlay');
        const grid = document.getElementById('worksGrid');
        
        grid.innerHTML = '';
        const fragment = document.createDocumentFragment();
        category.works.forEach((work, idx) => {
            const card = document.createElement('div');
            card.className = 'work-card';
            let imgUrl = work.src;
            if (!imgUrl && work.images && work.images.length > 0) {
                imgUrl = work.images[0];
            }
            const img = document.createElement('img');
            setImageWithFallback(img, imgUrl || '');
            img.alt = work.title || '作品';
            img.loading = 'lazy';
            img.decoding = 'async';
            let displayTitle = work.title;
            if (!displayTitle || displayTitle.trim() === '') {
                console.warn(`分类 ${catId} 中作品 ${idx+1} 缺少 title`, work);
                displayTitle = '(无标题)';
            }
            const titleDiv = document.createElement('div');
            titleDiv.className = 'work-title';
            titleDiv.textContent = displayTitle;
            card.appendChild(img);
            card.appendChild(titleDiv);
            card.addEventListener('click', () => openWorkDetail(idx));
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
        overlay.classList.add('active');
    }
    
    let currentDetailImages = [];
    let currentDetailImageIndex = 0;
    let detailActive = false;
    
    function openWorkDetail(index) {
        const work = currentCategoryWorks[index];
        if (!work) return;
        const images = work.images && work.images.length ? work.images : [work.src];
        currentDetailImages = images;
        currentDetailImageIndex = 0;
        
        const container = document.getElementById('detailContainer');
        const renderDetail = () => {
            const linkButton = work.link ? `<a href="${work.link}" target="_blank" class="work-detail-link">试听 <i class="fas fa-external-link-alt"></i></a>` : '';
            const hasMultiple = images.length > 1;
            const arrows = hasMultiple ? `<div class="carousel-arrow-detail left" id="carouselPrev">‹</div><div class="carousel-arrow-detail right" id="carouselNext">›</div><div class="carousel-indicators" id="carouselIndicators"></div>` : '';
            container.innerHTML = `
                <div class="detail-image">
                    <img class="carousel-img" id="carouselMainImg" src="${escapeHtml(images[0])}" alt="${escapeHtml(work.title)}" loading="lazy" decoding="async">
                    ${arrows}
                </div>
                <div class="detail-info">
                    <h2>${escapeHtml(work.title)}</h2>
                    <p>${formatDescription(work.description)}</p>
                    ${linkButton}
                </div>
            `;
            if (hasMultiple) {
                const indicatorsContainer = document.getElementById('carouselIndicators');
                for (let i = 0; i < images.length; i++) {
                    const dot = document.createElement('div');
                    dot.className = `carousel-dot ${i === currentDetailImageIndex ? 'active' : ''}`;
                    dot.addEventListener('click', () => {
                        currentDetailImageIndex = i;
                        updateDetailImage();
                    });
                    indicatorsContainer.appendChild(dot);
                }
                const prevBtn = document.getElementById('carouselPrev');
                const nextBtn = document.getElementById('carouselNext');
                if (prevBtn) prevBtn.addEventListener('click', () => {
                    currentDetailImageIndex = (currentDetailImageIndex - 1 + images.length) % images.length;
                    updateDetailImage();
                });
                if (nextBtn) nextBtn.addEventListener('click', () => {
                    currentDetailImageIndex = (currentDetailImageIndex + 1) % images.length;
                    updateDetailImage();
                });
            }
        };
        
        const updateDetailImage = () => {
            const imgEl = document.getElementById('carouselMainImg');
            if (!imgEl) return;
            gsap.to(imgEl, { opacity: 0, duration: 0.15, onComplete: () => {
                setImageWithFallback(imgEl, currentDetailImages[currentDetailImageIndex]);
                imgEl.onload = () => gsap.to(imgEl, { opacity: 1, duration: 0.2 });
                const dots = document.querySelectorAll('.carousel-dot');
                dots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentDetailImageIndex));
            }});
        };
        
        renderDetail();
        const overlay = document.getElementById('detailOverlay');
        overlay.classList.add('active');
        detailActive = true;
        
        const keyHandler = (e) => {
            if (!detailActive) return;
            if (e.key === 'Escape') {
                closeDetailOverlay();
            } else if (e.key === 'ArrowLeft') {
                if (currentDetailImages.length > 1) {
                    currentDetailImageIndex = (currentDetailImageIndex - 1 + currentDetailImages.length) % currentDetailImages.length;
                    updateDetailImage();
                }
            } else if (e.key === 'ArrowRight') {
                if (currentDetailImages.length > 1) {
                    currentDetailImageIndex = (currentDetailImageIndex + 1) % currentDetailImages.length;
                    updateDetailImage();
                }
            }
        };
        window.addEventListener('keydown', keyHandler);
        overlay._keyHandler = keyHandler;
        
        const closeDetailHandler = (e) => {
            if (e.target === overlay) {
                closeDetailOverlay();
            }
        };
        overlay.addEventListener('click', closeDetailHandler);
        overlay._closeHandler = closeDetailHandler;
    }
    
    function closeDetailOverlay() {
        const overlay = document.getElementById('detailOverlay');
        overlay.classList.remove('active');
        detailActive = false;
        if (overlay._keyHandler) {
            window.removeEventListener('keydown', overlay._keyHandler);
            delete overlay._keyHandler;
        }
        if (overlay._closeHandler) {
            overlay.removeEventListener('click', overlay._closeHandler);
            delete overlay._closeHandler;
        }
    }
    
    document.getElementById('closeDetail').addEventListener('click', closeDetailOverlay);
    
    function initFullSite() {
        initParticles();
        document.getElementById('storyTextArea').innerHTML = appData.story;
        document.getElementById('mainName').innerText = appData.studioName;
        document.getElementById('sloganText').innerText = appData.slogan;
        categories = appData.categories;
        carouselIndex = 0;
        renderCarousel();
        document.getElementById('carouselLeft').addEventListener('click', prevCategory);
        document.getElementById('carouselRight').addEventListener('click', nextCategory);
        
        const logo = document.getElementById('mainLogo');
        const nameSpan = document.getElementById('mainName');
        const brandWrapper = document.getElementById('brandWrapper');
        gsap.set(logo, { opacity: 0, scale: 0.95 });
        gsap.set(nameSpan, { opacity: 0, x: 10 });
        gsap.set(brandWrapper, { x: 0 });
        const tl = gsap.timeline();
        tl.to(logo, { opacity: 1, scale: 1, duration: 1.2, ease: "power2.out", delay: 0.3 })
          .to(logo, { scale: 1.02, duration: 0.8, repeat: 1, yoyo: true, ease: "power1.inOut", onComplete: () => gsap.set(logo, { scale: 1 }) }, "-=0.8")
          .to(brandWrapper, { 
    x: window.innerWidth <= 800 ? -100 : -180, 
    duration: 1.2, 
    ease: "power3.out" 
}, "+=1")
          .to(nameSpan, { opacity: 1, x: 0, duration: 1.2, ease: "power3.out" }, "<")
          .to('#sloganText', { opacity: 1, y: 0, boxShadow: "0 0 18px rgba(200,100,255,0.5)", duration: 0.6, ease: "power2.out" }, "+=0.4")
          .to('#scrollHint', { width: '80%', duration: 1, ease: "power1.inOut" }, "-=0.4")
          .call(() => { if (window.scrollY < 200) startBreathingGlow(); });
        
        let glowAnimation = null, isGlowing = true;
        function startBreathingGlow() {
            if (glowAnimation) glowAnimation.kill();
            glowAnimation = gsap.to(logo, { duration: 1.8, filter: "drop-shadow(0 0 12px #c084fc) drop-shadow(0 0 18px #f0a6ff)", repeat: -1, yoyo: true, ease: "power1.inOut", paused: true });
            if (window.scrollY < 200 && isGlowing) glowAnimation.play();
        }
        function stopBreathingGlow() { isGlowing = false; if (glowAnimation) { glowAnimation.kill(); glowAnimation = null; } gsap.set(logo, { filter: "none" }); }
        function resumeBreathingGlow() { if (window.scrollY >= 200) return; if (!isGlowing) { isGlowing = true; startBreathingGlow(); } else if (glowAnimation && glowAnimation.paused()) glowAnimation.play(); }
        window.addEventListener('scroll', () => { if (window.scrollY < 200) resumeBreathingGlow(); else stopBreathingGlow(); });
        
        // 粒子消散动画
        const heroSection = document.getElementById('hero');
        const slogan = document.getElementById('sloganText');
        const fxCanvas = document.getElementById('fx-canvas');
        let ctx = fxCanvas.getContext('2d');
        let currentParticles = [];
        let dissolveAnimationFrame = null;
        function resizeFxCanvas() { fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeFxCanvas);
        resizeFxCanvas();
        class Particle { constructor(x,y,c,s,vx,vy) { this.x=x; this.y=y; this.originX=x; this.originY=y; this.color=c; this.size=s; this.vx=vx; this.vy=vy; this.alpha=1; } update(p) { const e=1-Math.pow(1-p,3); this.x=this.originX+this.vx*180*e; this.y=this.originY+this.vy*180*e; this.alpha=1-e; } draw(ctx) { ctx.save(); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color; ctx.shadowBlur=6; ctx.shadowColor='#c084fc'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); ctx.restore(); } }
        function generateParticlesFromElement(el, n=80) { if(!el) return []; const r=el.getBoundingClientRect(); if(r.width===0||r.height===0) return []; const c=document.createElement('canvas'); c.width=r.width; c.height=r.height; const ct=c.getContext('2d'); let cols=[]; if(el.tagName==='IMG'&&el.complete&&el.naturalWidth>0){ ct.drawImage(el,0,0,r.width,r.height); const d=ct.getImageData(0,0,r.width,r.height).data; for(let i=0;i<n;i++){ const px=Math.floor(Math.random()*r.width), py=Math.floor(Math.random()*r.height), idx=(py*r.width+px)*4; cols.push(`rgb(${d[idx]},${d[idx+1]},${d[idx+2]})`); } } else { const bc=['#e0b0ff','#c084fc','#a855f7','#d946ef','#f0a6ff']; for(let i=0;i<n;i++) cols.push(bc[Math.floor(Math.random()*bc.length)]); } const p=[]; for(let i=0;i<n;i++){ const x=r.left+Math.random()*r.width, y=r.top+Math.random()*r.height, a=Math.random()*Math.PI*2, sp=0.4+Math.random()*0.8, vx=Math.cos(a)*sp, vy=Math.sin(a)*sp, col=cols[i%cols.length], sz=2+Math.random()*5; p.push(new Particle(x,y,col,sz,vx,vy)); } return p; }
        function updateDissolveProgress(prog) { if(!currentParticles.length && prog>0.05){ const lp=generateParticlesFromElement(logo,80), np=generateParticlesFromElement(nameSpan,50), sp=generateParticlesFromElement(slogan,40); currentParticles=[...lp,...np,...sp]; stopBreathingGlow(); } if(currentParticles.length){ for(let p of currentParticles) p.update(prog); const show=prog<0.05; gsap.set([logo,nameSpan,slogan],{opacity:show?1:0,visibility:show?'visible':'hidden'}); if(prog>=0.98){ if(dissolveAnimationFrame) cancelAnimationFrame(dissolveAnimationFrame); dissolveAnimationFrame=null; }else{ startParticleRender(); } } }
        function startParticleRender(){ if(dissolveAnimationFrame) cancelAnimationFrame(dissolveAnimationFrame); function render(){ if(!ctx) return; ctx.clearRect(0,0,fxCanvas.width,fxCanvas.height); for(let p of currentParticles) p.draw(ctx); dissolveAnimationFrame=requestAnimationFrame(render); } render(); }
        ScrollTrigger.create({ trigger: heroSection, start:"top top", end:"+=550", scrub:1.2, onUpdate:self=>{ const prog=Math.min(1,Math.max(0,self.progress)); updateDissolveProgress(prog); }, onLeaveBack:()=>{ if(dissolveAnimationFrame) cancelAnimationFrame(dissolveAnimationFrame); dissolveAnimationFrame=null; if(ctx) ctx.clearRect(0,0,fxCanvas.width,fxCanvas.height); currentParticles=[]; gsap.set([logo,nameSpan,slogan],{opacity:1,visibility:'visible'}); if(window.scrollY<200) resumeBreathingGlow(); } });
        
        const storySection = document.getElementById('storySection');
        ScrollTrigger.create({ trigger: storySection, start:"top 80%", end:"top 20%", scrub:0.8, onUpdate:self=>{ const p=Math.min(1,Math.max(0,self.progress)); const ep=1-Math.pow(1-p,2); storySection.style.opacity=ep; storySection.style.transform=`translateY(${30*(1-ep)}px)`; } });
        const storyParas = document.querySelectorAll('#storyTextArea p');
        if(storyParas.length) gsap.fromTo(storyParas, {opacity:0,y:20}, {opacity:1,y:0, stagger:0.2, duration:1, scrollTrigger:{ trigger:'#storySection', start:'top 80%', end:'bottom 70%', scrub:0.5 }});
        const carouselSection = document.getElementById('carouselSection');
        ScrollTrigger.create({ trigger: carouselSection, start:"top 80%", end:"top 20%", scrub:0.8, onUpdate:self=>{ const p=Math.min(1,Math.max(0,self.progress)); const ep=1-Math.pow(1-p,2); carouselSection.style.opacity=ep; carouselSection.style.transform=`translateY(${30*(1-ep)}px)`; } });
        document.getElementById('closeOverlay').addEventListener('click',()=>document.getElementById('worksOverlay').classList.remove('active'));
        
        const glowCursor = document.getElementById('cursorGlow');
        document.addEventListener('mousemove',e=>gsap.set(glowCursor,{left:e.clientX,top:e.clientY}));
        document.querySelectorAll('a, button, .category-carousel-card, .work-card, .close-overlay, .close-detail, .carousel-arrow').forEach(el=>{
            el.addEventListener('mouseenter',()=>gsap.to(glowCursor,{width:100,height:100,duration:0.2}));
            el.addEventListener('mouseleave',()=>gsap.to(glowCursor,{width:60,height:60,duration:0.2}));
        });
    }
    loadData();
</script>
</body>
</html>
